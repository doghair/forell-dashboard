<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forell | Financial Dashboard FY26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#eef0f5; --surface:#fff; --surface2:#f4f6fa; --surface3:#e8ecf4;
    --border:#d0d8e8; --border2:#e4e9f4;
    --accent:#e8732a; --accent-l:#fdf0e8;
    --good:#1aab72;  --good-l:#e8f8f2;
    --bad:#d63031;   --bad-l:#fdeaea;
    --warn:#c4962a;  --warn-l:#fdf5e0;
    --text:#18253d;  --text2:#3e4f6e; --text3:#7e8faa;
    --navy:#0d1829;
    --header-h:68px;
    --nav-h:52px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:15px;min-height:100vh;display:flex;flex-direction:column;}

  /* ── HEADER — sticky top ── */
  header{
    background:var(--navy);border-bottom:3px solid var(--accent);
    padding:0 32px;display:flex;align-items:center;justify-content:space-between;
    height:var(--header-h);position:sticky;top:0;z-index:300;
  }
  .logo{display:flex;align-items:center;gap:14px;}
  .logo-mark{width:38px;height:38px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
  .logo-text{font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;}
  .logo-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
  .hdr-title{font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);}
  .hdr-badge{background:var(--accent);color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:3px;}

  /* ── MONTH NAV — sticky below header ── */
  .month-nav{
    background:var(--surface);border-bottom:2px solid var(--border);
    padding:0 32px;display:flex;align-items:center;overflow-x:auto;
    position:sticky;top:var(--header-h);z-index:200;
    height:var(--nav-h);box-shadow:0 2px 10px rgba(0,0,0,.09);
  }
  .month-nav::-webkit-scrollbar{height:0;}
  .month-tab{
    padding:0 22px;height:var(--nav-h);display:flex;align-items:center;
    font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;
    white-space:nowrap;transition:color .18s,background .18s;
  }
  .month-tab:hover{color:var(--text2);background:var(--surface2);}
  .month-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .pdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .ytd-tab{margin-left:auto;border-left:2px solid var(--border);padding-left:22px;color:var(--text2);}
  .ytd-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* ── MAIN ── */
  main{flex:1;padding:28px 32px;max-width:1700px;margin:0 auto;width:100%;}

  .sec{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ── STATUS PILLS ── */
  .sbar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
  .pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:7px 15px;font-size:13px;font-weight:700;color:var(--text2);box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .pill .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dg{background:var(--good);} .db{background:var(--bad);} .dw{background:var(--warn);}

  /* ── SUMMARY BAND ── */
  .sband{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:22px 28px;display:flex;align-items:stretch;margin-bottom:24px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .si{display:flex;flex-direction:column;gap:4px;padding:0 28px;border-right:1px solid var(--border2);}
  .si:first-child{padding-left:0;} .si:last-child{border-right:none;}
  .si-lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
  .si-act{font-size:30px;font-weight:700;line-height:1.1;}
  .si-bud{font-size:13px;color:var(--text2);}
  .si-var{font-size:13px;font-weight:800;}
  .si-act.g{color:var(--good);} .si-act.b{color:var(--bad);} .si-act.w{color:var(--warn);} .si-act.n{color:var(--text);}
  .si-var.g{color:var(--good);} .si-var.b{color:var(--bad);} .si-var.w{color:var(--warn);}

  /* ── TREND STRIP ── */
  .tstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  @media(max-width:1200px){.tstrip{grid-template-columns:repeat(2,1fr);}}
  .tc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:15px 17px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .tc-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
  .tc-val{font-size:19px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .td{font-size:13px;font-weight:800;padding:3px 9px;border-radius:3px;}
  .tdg{color:var(--good);background:var(--good-l);} .tdb{color:var(--bad);background:var(--bad-l);} .tdw{color:var(--warn);background:var(--warn-l);}
  .twrap{height:58px;position:relative;}

  /* ── UTILIZATION ── */
  .util-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .util-wrap{height:210px;position:relative;}

  /* ── KPI GRID ── */
  .kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  @media(max-width:1200px){.kgrid{grid-template-columns:repeat(2,1fr);}}
  .kc{background:var(--surface);border:1px solid var(--border);border-left:5px solid var(--border);border-radius:6px;padding:16px 18px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .kc.g{border-left-color:var(--good);} .kc.b{border-left-color:var(--bad);} .kc.w{border-left-color:var(--warn);} .kc.n{border-left-color:var(--accent);}
  .kc-lbl{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
  .kc-act{font-size:28px;font-weight:700;line-height:1;margin-bottom:8px;}
  .kc-act.g{color:var(--good);} .kc-act.b{color:var(--bad);} .kc-act.w{color:var(--warn);} .kc-act.n{color:var(--text);}
  .kc-meta{display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap;}
  .kc-bud{color:var(--text3);}
  .kv{font-size:15px;font-weight:800;padding:3px 10px;border-radius:4px;}
  .kvg{color:var(--good);background:var(--good-l);} .kvb{color:var(--bad);background:var(--bad-l);} .kvw{color:var(--warn);background:var(--warn-l);}

  /* ── WIP TABLE ── */
  .wip-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .wip-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .wip-t{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);}
  .wip-tot{font-size:22px;font-weight:700;color:var(--bad);}
  table.wt{width:100%;border-collapse:collapse;}
  table.wt th{text-align:right;padding:8px 10px;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border);background:var(--surface2);}
  table.wt th:first-child{text-align:left;}
  table.wt td{padding:9px 10px;text-align:right;color:var(--text2);border-bottom:1px solid var(--border2);font-size:14px;}
  table.wt td:first-child{text-align:left;color:var(--text);}
  table.wt tr:hover td{background:var(--surface2);}

  /* ── LAYOUTS ── */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
  .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
  @media(max-width:1100px){.g4{grid-template-columns:1fr 1fr;}}
  @media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr;}}

  /* ── CHART / LIST CARDS ── */
  .cc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .cc-t{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
  .cch{position:relative;height:175px;}
  .lc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .lc-t{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);}
  .li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);}
  .li:last-child{border-bottom:none;}
  .lin{color:var(--text2);flex:1;padding-right:12px;font-size:14px;line-height:1.35;}
  .liv{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;}
  .liv.rb{color:var(--bad);}

  /* ── YTD HERO ── */
  .ytd-hero{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px 32px;margin-bottom:22px;display:flex;gap:0;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .ym{flex:1;min-width:160px;padding:0 28px;border-right:1px solid var(--border);}
  .ym:first-child{padding-left:0;} .ym:last-child{border-right:none;}
  .ym-lbl{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
  .ym-val{font-size:40px;font-weight:700;line-height:1;}
  .ym-sub{font-size:14px;color:var(--text2);margin-top:6px;}
  .ym-val.g{color:var(--good);} .ym-val.w{color:var(--warn);} .ym-val.n{color:var(--text);}

  /* ── PERF TABLE ── */
  .pt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:24px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  table.pt{width:100%;border-collapse:collapse;min-width:750px;}
  table.pt th{text-align:center;padding:10px 14px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border);background:var(--surface2);}
  table.pt th:first-child{text-align:left;}
  table.pt td{padding:10px 14px;text-align:center;border-bottom:1px solid var(--border2);font-size:14px;}
  table.pt td:first-child{text-align:left;color:var(--text2);font-size:13px;font-weight:700;}
  table.pt tr:hover td{background:var(--surface2);}
  table.pt .hl{background:rgba(232,115,42,.07);}
  .pg{color:var(--good);font-weight:700;} .pb{color:var(--bad);font-weight:700;} .pw{color:var(--warn);font-weight:700;} .pn{color:var(--text);font-weight:600;}

  .panel{display:none;} .panel.active{display:block;}

  footer{border-top:2px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
  .ft{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:700;}
</style>
</head>

<header>

const BASE = {
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{display:false},
    tooltip:{backgroundColor:'#18253d',titleColor:'#fff',bodyColor:'#d0d8e8',
             borderColor:'#3e4f6e',borderWidth:1,padding:11,

    y:{ticks:{color:'#7e8faa',font:{family:'Arial',size:12}},grid:{color:'rgba(180,195,220,0.4)'}}
  }
};
const SPARK={responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{enabled:false}},
  scales:{x:{display:false},y:{display:false}},
  elements:{point:{radius:0},line:{borderWidth:2,tension:0.35}},animation:false};

function cl(k){return CL[k]||CL.accent;}

function mkSpark(id,data,bdata,col){
  const el=document.getElementById(id);if(!el)return;
  new Chart(el,{type:'line',data:{labels:MO.slice(0,data.length),datasets:[
    {data,borderColor:cl(col),fill:false},
    {data:bdata,borderColor:'rgba(100,120,160,0.35)',borderDash:[4,3],fill:false,borderWidth:1.5}
  ]},options:SPARK});
}

function mkUtil(id,mi){
  const el=document.getElementById(id);if(!el)return;
  const act=UACT[mi],bud=UBUD[mi];
  new Chart(el,{type:'bar',data:{labels:UCATS,datasets:[
    {label:'Actual',data:act,backgroundColor:act.map((v,i)=>v>=bud[i]?'rgba(26,171,114,0.82)':'rgba(196,150,42,0.82)'),borderRadius:4,categoryPercentage:0.65,barPercentage:0.45},

function buildPanel(m){
  const varSign = m.profitDiff >= 0
    ? `<span class="si-var g">▲ +$${Math.abs(m.profitDiff).toFixed(1)}K vs Budget</span>`
    : `<span class="si-var b">▼ ($${Math.abs(m.profitDiff).toFixed(1)}K) vs Budget</span>`;

  const incomeAct = parseFloat(String(m.actIncome).replace(/[^0-9]/g,''));
  const incomeBud = parseFloat(String(m.budIncome).replace(/[^0-9]/g,''));
  const incDiff   = incomeAct - incomeBud;
  const incVar    = incDiff >= 0
    ? `<span class="si-var g">▲ +$${Math.abs(Math.round(incDiff/1000)).toFixed(0)}K vs Budget</span>`
    : `<span class="si-var b">▼ ($${Math.abs(Math.round(incDiff/1000)).toFixed(0)}K) vs Budget</span>`;
  const incClass  = incDiff >= 0 ? 'g' : (incDiff > -50000 ? 'w' : 'b');

    {label:'All Staff', data:UACT.map(v=>v[0]),backgroundColor:'rgba(232,115,42,0.82)',borderRadius:3,categoryPercentage:0.85,barPercentage:0.18},
    {label:'Principals',data:UACT.map(v=>v[1]),backgroundColor:'rgba(26,171,114,0.75)',borderRadius:3,categoryPercentage:0.85,barPercentage:0.18},
    {label:'Associates',data:UACT.map(v=>v[2]),backgroundColor:'rgba(196,150,42,0.75)',borderRadius:3,categoryPercentage:0.85,barPercentage:0.18},
    {label:'Engineers', data:UACT.map(v=>v[3]),backgroundColor:'rgba(88,120,168,0.75)',borderRadius:3,categoryPercentage:0.85,barPercentage:0.18},
    {label:'CAD',       data:UACT.map(v=>v[4]),backgroundColor:'rgba(214,48,49,0.65)',borderRadius:3,categoryPercentage:0.85,barPercentage:0.18},
  ]},options:{...L2,scales:{x:{...BASE.scales.x},y:{...BASE.scales.y,min:0,max:100,ticks:{...BASE.scales.y.ticks,callback:v=>v+'%'}}}}});
}

// ── Panel switching & init ──
const rendered={};
function showPanel(key,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+key).classList.add('active');
  el.classList.add('active');
  if(!rendered[key]){
    rendered[key]=true;
    setTimeout(()=>{
      if(key==='ytd') renderYTD();
      else MONTHS.forEach(m=>{ if(m.key===key) renderMonth(m); });
    },50);
  }
}

// ── Build all panels up front ──
MONTHS.forEach(m=>{ document.getElementById('panel-'+m.key).innerHTML = buildPanel(m); });
document.getElementById('panel-ytd').innerHTML = buildYTD();

// ── Render initial panel ──
rendered['sep25']=true;
renderMonth(MONTHS[0]);
</script>
